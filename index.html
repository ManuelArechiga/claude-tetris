<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem('tetris-theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
    })();
  </script>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1 class="game-title">TETRIS</h1>
      <button id="mute-toggle" class="theme-toggle" aria-label="Silenciar sonido" title="Sonido">🔊</button>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema">🌙</button>
      <select id="skin-select" class="skin-select" aria-label="Tema visual (skin)" title="Tema visual">
        <option value="retro">Retro</option>
        <option value="neon">Neón</option>
        <option value="pastel">Pastel</option>
        <option value="pixel">Pixel art</option>
      </select>
    </div>
    <div class="game-container">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="flash" class="flash hidden"></div>
      </div>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> / <kbd>Shift</kbd> reservar</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box" id="gameover-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>

      <div class="overlay-box pause-menu hidden" id="pause-menu">
        <p class="pause-title">PAUSA</p>

        <div class="pause-actions">
          <button id="resume-btn">Reanudar</button>
          <button id="pause-restart-btn">Reiniciar</button>
          <button id="controls-toggle-btn" aria-expanded="false">Ver controles</button>
        </div>

        <ul id="pause-controls" class="controls-list hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>C</kbd> / <kbd>Shift</kbd> reservar</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
        </ul>

        <div class="pause-level-select">
          <label class="label" for="start-level-select">NIVEL INICIAL</label>
          <select id="start-level-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
