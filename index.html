<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem('tetris-theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
    })();
  </script>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1 class="game-title">TETRIS</h1>
      <button id="mute-toggle" class="theme-toggle" aria-label="Silenciar sonido" title="Sonido">🔊</button>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema">🌙</button>
    </div>
    <div class="game-container">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="flash" class="flash hidden"></div>
      </div>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> / <kbd>Shift</kbd> reservar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="overlay-highscore-form" class="highscore-form hidden">
          <label for="overlay-name-input">¡Nuevo récord! Ingresá tu nombre:</label>
          <div class="highscore-form-row">
            <input id="overlay-name-input" type="text" maxlength="12" placeholder="Nombre" autocomplete="off" />
            <button id="overlay-name-save">Guardar</button>
          </div>
        </div>
        <div class="highscores-block">
          <span class="label">RÉCORDS</span>
          <ol id="overlay-highscores" class="highscores-list"></ol>
          <div class="stats-line">
            <span>Mejor combo: <strong id="overlay-best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="overlay-best-lines">0</strong></span>
          </div>
        </div>
        <button id="restart-btn">Reiniciar</button>
        <button id="overlay-reset-scores-btn" class="reset-scores-btn">Borrar récords</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>
        <div class="highscores-block">
          <span class="label">RÉCORDS</span>
          <ol id="start-highscores" class="highscores-list"></ol>
          <div class="stats-line">
            <span>Mejor combo: <strong id="start-best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="start-best-lines">0</strong></span>
          </div>
        </div>
        <button id="play-btn">Jugar</button>
        <button id="start-reset-scores-btn" class="reset-scores-btn">Borrar récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
